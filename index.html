<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fort Greene Press is an independent publishing project in Brooklyn, New York."
    />
    <meta name="theme-color" content="#526441" />
    <meta property="og:title" content="Fort Greene Press" />
    <meta
      property="og:description"
      content="Independent publishing from Fort Greene, Brooklyn."
    />
    <meta property="og:type" content="website" />
    <title>Fort Greene Press</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="wordmark" href="./" aria-label="Fort Greene Press home">
        <span>Fort Greene</span>
        <span>Press</span>
      </a>
      <nav aria-label="Main navigation">
        <a href="mailto:hello@fortgreenepress.com">Contact</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <p class="eyebrow">Brooklyn, New York</p>
        <figure class="hero-map">
          <img
            src="assets/fort-greene-map.png"
            alt="Historic district map of Fort Greene, Brooklyn"
          />
        </figure>
        <h1 id="hero-title">
          Stories made<br />
          <em>to be held.</em>
        </h1>
        <div class="hero-footer">
          <p>
            An independent press for writing, art, and ideas rooted in the
            neighborhood and reaching beyond it.
          </p>
        </div>
      </section>
    </main>

    <footer>
      <p>Fort Greene Press</p>
      <p>Brooklyn, NY</p>
      <p>© <span id="year">2026</span></p>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
